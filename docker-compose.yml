services:
  # ─────────────────────────────────────────────
  # QoreChain Node (validator)
  # ─────────────────────────────────────────────
  qorechain-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qorechain-validator-1
    ports:
      - "26657:26657"   # QoreChain Consensus Engine RPC
      - "26656:26656"   # QoreChain Consensus Engine P2P
      - "1317:1317"     # QoreChain SDK REST API
      - "9090:9090"     # QoreChain SDK gRPC
      - "26660:26660"   # Prometheus metrics
      - "8545:8545"     # EVM JSON-RPC (HTTP)
      - "8546:8546"     # EVM JSON-RPC (WebSocket)
    volumes:
      - node-data:/root/.qorechaind
    environment:
      - CHAIN_ID=qorechain-testnet-1
      - MONIKER=qorechain-validator-1
      - AI_SIDECAR_ADDRESS=ai-sidecar:50051
      - LD_LIBRARY_PATH=/usr/local/lib
    depends_on:
      ai-sidecar:
        condition: service_healthy
    networks:
      - qorechain-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26657/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # AI Sidecar Service (pre-built image)
  # ─────────────────────────────────────────────
  ai-sidecar:
    image: ghcr.io/qorechain/ai-sidecar:latest
    container_name: qorechain-ai-sidecar
    ports:
      - "50051:50051"   # gRPC
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - QCAI_ACCESS_KEY_ID=${QCAI_ACCESS_KEY_ID}
      - QCAI_SECRET_ACCESS_KEY=${QCAI_SECRET_ACCESS_KEY}
      - AI_MODEL_ID=${AI_MODEL_ID}
      - LOG_LEVEL=info
    networks:
      - qorechain-net
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────
  # Block Indexer (pre-built image)
  # ─────────────────────────────────────────────
  block-indexer:
    image: ghcr.io/qorechain/block-indexer:latest
    container_name: qorechain-indexer
    depends_on:
      qorechain-node:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - RPC_URL=ws://qorechain-node:26657/websocket
      - REST_URL=http://qorechain-node:1317
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=qorechain_explorer
      - DB_USER=qorechain
      - DB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    networks:
      - qorechain-net
    restart: unless-stopped
    mem_limit: 256m

  # ─────────────────────────────────────────────
  # PostgreSQL (Explorer database)
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qorechain-postgres
    environment:
      - POSTGRES_DB=qorechain_explorer
      - POSTGRES_USER=qorechain
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - qorechain-net
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qorechain"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # Prometheus (Metrics collection)
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: qorechain-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - qorechain-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Grafana (Metrics dashboard)
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: qorechain-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - qorechain-net
    restart: unless-stopped

volumes:
  node-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  qorechain-net:
    driver: bridge
