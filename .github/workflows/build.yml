name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build Chain Binary
        run: CGO_ENABLED=1 go build -o qorechaind ./cmd/qorechaind/

      - name: Build Sidecar
        run: cd sidecar && go build ./...

      - name: Build Indexer
        run: cd indexer && go build ./...

      - name: Run Tests
        run: CGO_ENABLED=1 go test ./... -count=1 -timeout 300s
        continue-on-error: true

      - name: Run Sidecar Tests
        run: cd sidecar && go test ./... -count=1
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run go vet
        run: CGO_ENABLED=1 go vet ./...
        continue-on-error: true
